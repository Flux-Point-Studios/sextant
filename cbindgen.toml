language = "C"
pragma_once = true
cpp_compat = true
style = "type"

[export]
prefix = ""
# The status enum and the Tier-2 spend-status struct are not referenced by any function
# signature (the exports return a raw int32_t; the Tier-2 verdict is produced host-side), so
# force them in — they are the banding contracts C consumers switch on.
include = ["SextantStatus", "SextantSpendStatus"]
# Internal Rust pub consts are not part of the C ABI surface.
exclude = ["SLOTS_PER_KES_PERIOD"]

[defines]
"feature = mithril" = "SEXTANT_MITHRIL"

[parse]
parse_deps = false
