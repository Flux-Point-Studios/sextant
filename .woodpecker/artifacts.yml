when:
  - event: [push, pull_request, manual]

steps:
  - name: artifacts
    image: rust:1.93-bookworm
    commands:
      - rustup target add wasm32-unknown-unknown
      # Build the shipped DoD line-6 artifacts: the lean default static library
      # (no blst — mithril is off by default) and the wasm32 module. The manifest
      # is rlib-only (dependency builds must stay linkable-free for no_std
      # consumers), so the linkable forms are requested explicitly here.
      - cargo rustc --release --crate-type staticlib
      - cargo rustc --release --target wasm32-unknown-unknown --crate-type cdylib
      # Link the real static library through the committed C header and run it:
      # proves external C linkage + #[no_mangle] symbol retention on the Linux
      # artifact target. Built without -DSEXTANT_MITHRIL, so it also proves the
      # default library needs no mithril/blst symbol.
      - cc -I include tests/smoke/smoke.c target/release/libsextant.a -o smoke -lpthread -ldl -lm
      - ./smoke
      # Assemble the three artifacts; the run log lists them — the proof they
      # were produced in CI. (A durable downloadable release is the operator's
      # publish-secret decision, deferred.)
      - mkdir -p dist
      - cp target/release/libsextant.a dist/
      - cp include/sextant.h dist/
      - cp target/wasm32-unknown-unknown/release/sextant.wasm dist/
      - ls -l dist
